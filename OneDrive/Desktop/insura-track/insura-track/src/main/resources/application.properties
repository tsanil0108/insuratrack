spring.application.name=insura-track

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/Insuratrack}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:Anil108}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Hibernate Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=${PORT:8080}

# JWT Configuration (Single source of truth)
# This is a Base64 encoded 256-bit key - DO NOT USE IN PRODUCTION, generate your own
jwt.secret=${JWT_SECRET:VGhpcy1pcy1hLXNlY3VyZS1qd3Qtc2VjcmV0LWtleS1mb3ItaG1hYy1zaGEtMjU2LWJpdHMtMjAyNA==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Multipart File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB
spring.servlet.multipart.file-size-threshold=2KB

# Payment slip upload directory (make sure this path exists)
payment.slip.upload.dir=uploads/payment-slips