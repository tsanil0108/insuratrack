spring.application.name=insura-track

# ============================================================
# DATABASE CONFIGURATION
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/trackDB}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:Anil108}}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA CONFIGURATION
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ============================================================
# SERVER CONFIGURATION
# ============================================================
server.port=${PORT:8080}

# ============================================================
# JWT CONFIGURATION
# ============================================================
jwt.secret=${JWT_SECRET:bmV3LXNlY3VyZS1qd3Qtc2VjcmV0LWtleS0yMDI1LWZvci1pbnN1cmEtdHJhY2stcHJvamVjdC1maXhlZA==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================================
# FILE UPLOAD CONFIGURATION
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB
spring.servlet.multipart.file-size-threshold=2KB

# Upload directories (relative paths from project root)
app.upload.dir=uploads/documents
payment.slip.upload.dir=uploads/payment-slips

# ============================================================
# JACKSON CONFIGURATION
# ============================================================
spring.jackson.serialization.fail-on-empty-beans=false

# ============================================================
# ADMIN SECRET KEY (for registration)
# ============================================================
app.admin.secret=${ADMIN_SECRET:admin123}